name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push Docker image"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || format('{0}/scaffold-bench-go', github.repository_owner) }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Build embedded frontend
        run: cd frontend && bun run build

      - name: Run Go tests
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build ID
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "CI_BUILD_ID=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            short_sha=$(git rev-parse --short HEAD)
            if [[ -n "$(git status --porcelain)" ]]; then
              echo "CI_BUILD_ID=${short_sha}-dirty" >> "$GITHUB_ENV"
            else
              echo "CI_BUILD_ID=${short_sha}" >> "$GITHUB_ENV"
            fi
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install make
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Build Go binaries
        run: make build-go-local OSES=linux

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to Docker Hub
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || github.event.inputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || github.event.inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
