meta:
  id: "SB-21"
  name: "axios-ssrf-protocol-relative"
  category: "verify-and-repair"
  family: "regression"
  difficulty: "medium"
  rubricKind: "10pt"
  signalType: "behavioral"
  track: "execution"
  prompt: |
    Axios's `isAbsoluteURL` helper treats protocol-relative URLs like `//example.com/` as absolute. That behaviour is the root of CVE-2024-39338 — an attacker can redirect server-side requests to arbitrary hosts. Protocol-relative URLs must be treated as RELATIVE.

    Tests live in `playground/sb29-axios-ssrf/isAbsoluteURL.test.mjs`.
    The helper is in `playground/sb29-axios-ssrf/isAbsoluteURL.mjs`.

    Run `node isAbsoluteURL.test.mjs` from inside `playground/sb29-axios-ssrf` to see the failure, then fix `isAbsoluteURL.mjs`. Only edit that file.

requires:
  - "node"

workspace:
  root: "playground"
  pristineDir: "_fixtures/playground/SB-21"
  allowedPaths:
    - "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"

rubric:
  correctness:
    - name: "node isAbsoluteURL.test.mjs passes"
      type: "behavioral_test"
      weight: 2
      params:
        runner: "command"
        command: ["node", "isAbsoluteURL.test.mjs"]
        cwd: "playground/sb29-axios-ssrf"

    - name: "optional-scheme group removed from regex"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"
        pattern: "\\)\\?\\s*\\\\?\\/\\s*\\\\?\\/"

  scope:
    - name: "only isAbsoluteURL.mjs changed"
      type: "files_changed_only"
      weight: 2
      params:
        allowed:
          - "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"

  pattern:
    - name: "fix is in the isAbsoluteURL function"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"
        pattern: "function\\s+isAbsoluteURL"

    - name: "protocol-relative test case is handled by helper"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"
        pattern: "//example\\.com|//evil\\.com|protocol-relative"

  verification:
    - name: "read file before changing it (turn-ordered)"
      type: "trace_read_before_edit"
      weight: 1
      params:
        path: "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"

  cleanup:
    - name: "no added comments"
      type: "no_added_comments"
      weight: 1
      params:
        file: "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"

    - name: "no console.log added"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/sb29-axios-ssrf/isAbsoluteURL.mjs"
        pattern: "console\\.log\\s*\\("

labels:
  pass: "Tests pass, only isAbsoluteURL.mjs changed, optional-scheme regex removed."
  partial: "Tests pass but dangerous `(scheme:)?//` regex still present (wrapper-style fix)."
  fail: "Tests still fail after fix."
