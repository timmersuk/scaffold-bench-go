meta:
  id: "SB-22"
  name: "nextjs-server-client-boundary"
  category: "surgical-edit"
  family: "regex-style"
  difficulty: "medium"
  rubricKind: "10pt"
  signalType: "behavioral"
  track: "execution"
  prompt: |
    The dashboard filters component fails to build. Fix it with the smallest correct change. Do not refactor.

requires: []

workspace:
  root: "playground"
  pristineDir: "_fixtures/playground/SB-22"
  allowedPaths:
    - "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"

rubric:
  correctness:
    - name: '"use client" is the first module directive (AST)'
      type: "ast_first_directive"
      weight: 2
      params:
        file: "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"
        directive: "use client"

    - name: "component still uses useState (AST)"
      type: "ast_component_uses_hook"
      weight: 1
      params:
        file: "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"
        component: "DashboardFilters"
        hook: "useState"

  scope:
    - name: "edited only DashboardFilters.tsx"
      type: "files_changed_only"
      weight: 1
      params:
        allowed:
          - "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"

    - name: "settings/page.tsx untouched (red herring)"
      type: "file_equals_original"
      weight: 0.5
      params:
        file: "playground/nextjs-app/app/settings/page.tsx"

    - name: "other app files untouched"
      type: "file_equals_original"
      weight: 0.5
      params:
        file: "playground/nextjs-app/app/dashboard/page.tsx"

  pattern:
    - name: "useState import unchanged"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"
        pattern: "import\\s*\\{[^}]*useState[^}]*\\}\\s*from\\s*[\"']react[\"']"

    - name: "onClick handler unchanged"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"
        pattern: "onClick"

  verification:
    - name: "searched before editing"
      type: "trace_search_before_edit"
      weight: 1
      params: {}

  cleanup:
    - name: 'no "use server" directive added'
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"
        pattern: "[\"']use server[\"']"

    - name: "no console.log added"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/nextjs-app/app/dashboard/DashboardFilters.tsx"
        pattern: "console\\.log\\s*\\("

labels:
  pass: "Added 'use client' directive at the top of the right file, nothing else touched."
  partial: "Directive added but file reorganized, OR added to wrong file."
  fail: "Refactored, wrapped in dynamic import, or didn't add the directive."
