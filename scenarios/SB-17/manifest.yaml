meta:
  id: "SB-17"
  name: "hono-soft-delete-restore"
  category: "implementation"
  family: "spec-impl"
  difficulty: "low"
  rubricKind: "10pt"
  signalType: "behavioral"
  track: "execution"
  prompt: |
    Read the spec at playground/hono-api/specs/soft-delete-restore.md and implement the feature described there. Follow the patterns already established in playground/hono-api/.

requires:
  - "bun"

workspace:
  root: "playground/hono-api"
  pristineDir: "_fixtures/playground/SB-17"
  allowedPaths:
    - "playground/hono-api/src/routes/items.ts"

rubric:
  correctness:
    - name: "bun tests pass"
      type: "command"
      weight: 3
      params:
        command: "cd playground/hono-api && bun install --frozen-lockfile 2>/dev/null || bun install && bun test tests/sb-17-soft-delete-restore.test.ts"
        timeout_ms: 60000

  scope:
    - name: "only expected files changed"
      type: "files_changed_only"
      weight: 2
      params:
        allowed:
          - "playground/hono-api/src/routes/items.ts"

  pattern:
    - name: "preserved GET /items handler"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/items.ts"
        pattern: "itemsRoutes\\.get\\("

    - name: "uses not_deleted code on already-active"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/items.ts"
        pattern: "not_deleted"

  verification:
    - name: "read the spec file"
      type: "trace_read_before_edit"
      weight: 1
      params:
        path: "playground/hono-api/specs/soft-delete-restore.md"

  cleanup:
    - name: "no added comments"
      type: "no_added_comments"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/items.ts"

    - name: "no console.log"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/items.ts"
        pattern: "console\\.log"

labels:
  pass: "All tests pass with correct restore route and preserved handlers."
  partial: "Some tests fail, or implementation pieces missing."
  fail: "Did not implement the restore endpoint correctly."
