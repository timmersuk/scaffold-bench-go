meta:
  id: "SB-25"
  name: "tanstack-router-loader-ownership"
  category: "scope-discipline"
  family: "regex-style"
  difficulty: "medium"
  rubricKind: "10pt"
  signalType: "regex-shape"
  prompt: |
    In `playground/tanstack-router-app`, the route at `src/routes/projects.tsx` should own the projects data via its `loader`. `ProjectsTable.tsx` should be a presentational component that receives `projects` as a prop. Keep the existing stack and don't refactor unrelated code.

workspace:
  root: "playground/tanstack-router-app"
  pristineDir: "_fixtures/playground/SB-25"

rubric:
  correctness:
    - name: "route loader calls fetchProjects"
      type: "ast_property_contains_call"
      weight: 1
      params:
        file: "playground/tanstack-router-app/src/routes/projects.tsx"
        property: "loader"
        callee: "fetchProjects"

    - name: "route component uses loader data"
      type: "ast_file_calls"
      weight: 1
      params:
        file: "playground/tanstack-router-app/src/routes/projects.tsx"
        callee: "useLoaderData"

    - name: "route passes projects as prop to table"
      type: "ast_jsx_passes_prop"
      weight: 1
      params:
        file: "playground/tanstack-router-app/src/routes/projects.tsx"
        component: "ProjectsTable"
        prop: "projects"

  scope:
    - name: "edited only routes/projects.tsx and components/ProjectsTable.tsx"
      type: "files_changed_only"
      weight: 2
      params:
        allowed:
          - "playground/tanstack-router-app/src/routes/projects.tsx"
          - "playground/tanstack-router-app/src/components/ProjectsTable.tsx"

  pattern:
    - name: "ProjectsTable does not call useQuery"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/tanstack-router-app/src/components/ProjectsTable.tsx"
        pattern: "useQuery"

    - name: "ProjectsTable declares projects props"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/tanstack-router-app/src/components/ProjectsTable.tsx"
        pattern: "ProjectsTableProps"

  verification:
    - name: "searched before editing"
      type: "trace_search_before_edit"
      weight: 1
      params:
        path: "playground/tanstack-router-app/src/routes/projects.tsx"

  cleanup:
    - name: "no orphaned useQuery / fetch imports in table"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/tanstack-router-app/src/components/ProjectsTable.tsx"
        pattern: "fetch\\s*\\(|axios"

    - name: "no console.log added in table"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/tanstack-router-app/src/components/ProjectsTable.tsx"
        pattern: "console\\.log\\s*\\("

labels:
  pass: "Route owns loader data, table is presentational, no duplicate fetching."
  partial: "Consolidated the data ownership but with some drift from the pattern."
  fail: "Did not establish loader ownership or table still fetches independently."
