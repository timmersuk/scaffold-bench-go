meta:
  id: "SB-16"
  name: "hono-audit-log"
  category: "implementation"
  family: "spec-impl"
  difficulty: "medium"
  rubricKind: "10pt"
  signalType: "behavioral"
  track: "execution"
  prompt: |
    Read the spec at playground/hono-api/specs/audit-log.md and implement the feature described there. Follow the patterns already established in playground/hono-api/.

requires:
  - "bun"

workspace:
  root: "playground/hono-api"
  pristineDir: "_fixtures/playground/SB-16"
  allowedPaths:
    - "playground/hono-api/src/lib/audit.ts"
    - "playground/hono-api/src/routes/admin.ts"
    - "playground/hono-api/src/index.ts"
    - "playground/hono-api/schema.sql"

rubric:
  correctness:
    - name: "bun tests pass"
      type: "command"
      weight: 3
      params:
        command: "cd playground/hono-api && bun install --frozen-lockfile 2>/dev/null || bun install && bun test tests/sb-16-audit-log.test.ts"
        timeout_ms: 60000

  scope:
    - name: "only expected files changed"
      type: "files_changed_only"
      weight: 2
      params:
        allowed:
          - "playground/hono-api/src/lib/audit.ts"
          - "playground/hono-api/src/routes/admin.ts"
          - "playground/hono-api/src/index.ts"
          - "playground/hono-api/schema.sql"

  pattern:
    - name: "audit.ts exports logAudit"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/lib/audit.ts"
        pattern: "export\\s+(function|const|let)\\s+logAudit"

    - name: "admin.ts exports adminRoutes"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/admin.ts"
        pattern: "export\\s+(const|let)\\s+adminRoutes"

  verification:
    - name: "read the spec file"
      type: "trace_read_before_edit"
      weight: 1
      params:
        path: "playground/hono-api/specs/audit-log.md"

  cleanup:
    - name: "no console.log in audit.ts"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/lib/audit.ts"
        pattern: "console\\.log"

    - name: "no console.log in admin.ts"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/admin.ts"
        pattern: "console\\.log"

labels:
  pass: "All tests pass with audit helper, admin route, schema, and wiring."
  partial: "Some tests fail, or implementation pieces missing."
  fail: "Did not implement the audit log feature."
