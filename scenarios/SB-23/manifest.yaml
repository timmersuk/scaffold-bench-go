meta:
  id: "SB-23"
  name: "express-middleware-order"
  category: "verify-and-repair"
  family: "regression"
  difficulty: "medium"
  rubricKind: "10pt"
  signalType: "behavioral"
  track: "execution"
  prompt: |
    The auth tests in `playground/express-api` show `/api/me` returning 200 when it should return 401.
    Fix the bug in `src/server.ts` and verify the tests pass.

requires:
  - "bun"

workspace:
  root: "playground"
  pristineDir: "_fixtures/playground/SB-23"
  allowedPaths:
    - "playground/express-api/src/server.ts"

rubric:
  correctness:
    - name: "vitest passes"
      type: "behavioral_test"
      weight: 2
      params:
        runner: "command"
        command: ["bun", "x", "vitest", "run", "tests/auth-order.test.ts"]
        cwd: "playground/express-api"

    - name: "auth ordering at least partially correct"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/express-api/src/server.ts"
        pattern: "requireAuth[\\s\\S]*?privateRoutes"

  scope:
    - name: "only src/server.ts changed"
      type: "files_changed_only"
      weight: 2
      params:
        allowed:
          - "playground/express-api/src/server.ts"

  pattern:
    - name: "express.json() before routes"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/express-api/src/server.ts"
        pattern: "express\\.json\\(\\)[\\s\\S]*?app\\.use\\s*\\(\\s*[\"']/api"

    - name: "canonical middleware order"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/express-api/src/server.ts"
        pattern: "express\\.json\\(\\)[\\s\\S]*?publicRoutes[\\s\\S]*?requireAuth[\\s\\S]*?privateRoutes"

  verification:
    - name: "read file before changing it (turn-ordered)"
      type: "trace_read_before_edit"
      weight: 1
      params:
        path: "playground/express-api/src/server.ts"

  cleanup:
    - name: "no console.log added"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/express-api/src/server.ts"
        pattern: "console\\.log\\s*\\("

    - name: "no commented-out app.use lines"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/express-api/src/server.ts"
        pattern: "^\\s*//.*app\\.use"

labels:
  pass: "Tests pass, only server.ts changed, canonical middleware order."
  partial: "Tests pass but fix is superficial or order not canonical."
  fail: "Tests still fail after fix."
