meta:
  id: "SB-14"
  name: "hono-admin-password-reset"
  category: "implementation"
  family: "spec-impl"
  difficulty: "high"
  rubricKind: "10pt"
  signalType: "behavioral"
  track: "execution"
  prompt: |
    Read the spec at playground/hono-api/specs/admin-password-reset.md and implement the feature described there. Follow the patterns already established in playground/hono-api/.

requires:
  - "bun"

workspace:
  root: "playground/hono-api"
  pristineDir: "_fixtures/playground/SB-14"
  allowedPaths:
    - "playground/hono-api/src/routes/password-resets.ts"
    - "playground/hono-api/src/index.ts"
    - "playground/hono-api/schema.sql"

rubric:
  correctness:
    - name: "bun tests pass"
      type: "command"
      weight: 3
      params:
        command: "cd playground/hono-api && bun install --frozen-lockfile 2>/dev/null || bun install && bun test tests/sb-14-password-resets.test.ts"
        timeout_ms: 60000

  scope:
    - name: "only expected files changed"
      type: "files_changed_only"
      weight: 2
      params:
        allowed:
          - "playground/hono-api/src/routes/password-resets.ts"
          - "playground/hono-api/src/index.ts"
          - "playground/hono-api/schema.sql"

  pattern:
    - name: "uses AppError from lib/errors"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/password-resets.ts"
        pattern: "from.*lib/errors"

    - name: "index.ts mounts both routers"
      type: "file_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/index.ts"
        pattern: "adminPasswordResetsRoutes"

  verification:
    - name: "read the spec file"
      type: "trace_read_before_edit"
      weight: 1
      params:
        path: "playground/hono-api/specs/admin-password-reset.md"

  cleanup:
    - name: "no console.log"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/password-resets.ts"
        pattern: "console\\.log"

    - name: "no commented-out TODO/FIXME"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/hono-api/src/routes/password-resets.ts"
        pattern: "^\\s*//.*(TODO|FIXME|XXX)"

labels:
  pass: "All tests pass with correct file layout, patterns, and session invalidation."
  partial: "Some tests fail, or implementation pieces missing."
  fail: "Did not produce a workable implementation."
