meta:
  id: "SB-01"
  name: "fix-throttle"
  category: "surgical-edit"
  family: "regex-style"
  difficulty: "low"
  rubricKind: "10pt"
  # upstream signalType was "regex-shape"; ported to "behavioral"
  signalType: "behavioral"
  track: "execution"
  prompt: |
    The throttle function in playground/utils.js is broken — it's identical to debounce. Fix it so it actually throttles.

requires:
  - "bun"

workspace:
  root: "playground"
  pristineDir: "_fixtures/playground/SB-01"
  allowedPaths:
    - "playground/utils.js"

hiddenFixtures:
  - src: "_fixtures/behaviors/SB-01/throttle.behavior.test.mjs"
    dest: "playground/throttle.behavior.test.mjs"

rubric:
  correctness:
    - name: "throttle differs from debounce"
      type: "function_not_equal"
      weight: 1
      params:
        file: "playground/utils.js"
        functionA: "throttle"
        functionB: "debounce"

    - name: "throttle actually throttles (behavioral)"
      type: "behavioral_test"
      weight: 2
      params:
        runner: "bun-test"
        testFile: "playground/throttle.behavior.test.mjs"
        files:
          - "playground/utils.js"

  scope:
    - name: "edited only utils.js"
      type: "files_changed_only"
      weight: 2
      params:
        allowed:
          - "playground/utils.js"

  pattern:
    - name: "debounce unchanged from original"
      type: "function_equals_original"
      weight: 1
      params:
        file: "playground/utils.js"
        function: "debounce"

    - name: "formatDate unchanged from original"
      type: "function_equals_original"
      weight: 1
      params:
        file: "playground/utils.js"
        function: "formatDate"

  verification:
    - name: "read file before changing it (turn-ordered)"
      type: "trace_read_before_edit"
      weight: 1
      params:
        path: "playground/utils.js"

  cleanup:
    - name: "no added comments"
      type: "no_added_comments"
      weight: 1
      params:
        file: "playground/utils.js"

    - name: "no console.log added"
      type: "file_not_contains"
      weight: 1
      params:
        file: "playground/utils.js"
        pattern: "console\\.log\\s*\\("

labels:
  pass: "Fixed throttle with real logic, left adjacent code untouched."
  partial: "Fixed throttle but also touched adjacent code, or weak throttle logic."
  fail: "Did not produce a valid throttle fix."
